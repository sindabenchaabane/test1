<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Menu - Occitanie Game</title>
    <link rel="stylesheet" href="occitanie.css">
</head>
<body>
    <div id="menu-container">
        <h1>Bienvenue dans notre jeu</h1>
        
        <p>Entrez votre pseudo :</p>
        <input type="text" id="pseudo" placeholder="Ex: Jean" required>
        
        <br><br>
        
        <button onclick="startGame()">CLIQUEZ SUR START</button>
    </div>

    <script>
        function startGame() {
            let name = document.getElementById("pseudo").value;
            if (name === "") {
                alert("N'oublie pas ton pseudo !");
            } else {
                // On enregistre le pseudo dans la mémoire du navigateur (optionnel)
                localStorage.setItem("playerName", name);
                // On change de page !
                window.location.href = "web.html";
            }
        }
    </script>
</body>
</html>
