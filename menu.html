<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Menu - Occitanie Game</title>
        <link rel="stylesheet" href="occitanie.css">
    </head>

    <body>


        <div id="menu-card">
            <h1>Occitanie Game</h1>
            <p>Enter your nickname:</p>
            <input type="text" id="pseudo" placeholder="ex. John" required>
            
            <button class="btn-start" onclick="confirmPseudo()">VALIDATE NICKNAME</button>
            
            <p id="msg-choix" style="display:none; color:#ffcc00; font-weight:bold; margin-top:10px;">
                Let's go! Click on a city to start.
            </p>
        </div>



        <div class="image-gallery">
            <div class="image-item" onclick="launchGame('Toulouse')" style="cursor:pointer;">
                <img src="img/fond1.jpg" alt="Toulouse">
                <span>Toulouse</span>
        </div>
        <div class="image-item" onclick="launchGame('Carcassonne')" style="cursor:pointer;">
            <img src="img/fond2.jpg" alt="Carcassonne">
            <span>Carcassonne</span>
        </div>
        <div class="image-item" onclick="launchGame('Albi')" style="cursor:pointer;">
            <img src="img/fond3.jpeg" alt="Albi">
            <span>Albi</span>
        </div>



        <div id="rules-bottom">
            <h3>📜 Survival rules</h3>
            <div class="rules-content">
                <p>🌸 Collect up to <strong>2 violets</strong> maximum.</p>
                <p>🛡️ Each violet allows you to hit <strong>1 obstacle</strong> without dying.</p>
            </div>
        </div>


        <script>
            // Step 1 : Validate nickname and show instructions
            function confirmPseudo() {
                let name = document.getElementById("pseudo").value;
                if (name === "") {
                    alert("Don't forget your nickname before choosing a city!");
                } else {
                    localStorage.setItem("playerName", name);
                    // On affiche le message d'instruction - Show instructions
                    document.getElementById("msg-choix").style.display = "block";
                    // On fait défiler doucement vers les images - Smooth scroll to images
                    window.scrollBy({ top: 200, behavior: 'smooth' });
                }
            }


            // Step 2 : Launch game on city click
            function launchGame(villeChoisie) {
                let name = localStorage.getItem("playerName");
                
                if (!name || name === "") {
                    alert("Don't forget your nickname before choosing a city!");
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    // ON DÉTERMINE LE CHEMIN DE L'IMAGE SELON LA VILLE CHOISIE - Pick background image path based on chosen city
                    let bgImage = "";
                    if (villeChoisie === 'Toulouse') bgImage = "img/tls.png";
                    if (villeChoisie === 'Carcassonne') bgImage = "img/crc.png";
                    if (villeChoisie === 'Albi') bgImage = "img/alb.png";

                    // ON ENREGISTRE TOUT - Save everything in localStorage
                    localStorage.setItem("playerLocation", villeChoisie);
                    localStorage.setItem("selectedBackground", bgImage);
                    
                    // Launch the game
                    window.location.href = "web.html";
                }
            }
        </script>

</body>
</html>
